<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MONEY COMING SLOT VIP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🎰 ক্যাসিনো হেডার প্যানেল -->
    <div class="header">
        <div class="brand">
            <div class="name">MONEY COMING</div>
            <div class="game">3+1 REEL CASH BUZZER</div>
        </div>
        <div class="header-right">
            <button class="sound-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
            <div class="balance-box">৳ <span id="user-balance">0.00</span></div>
        </div>
    </div>

    <!-- 🎰 [৩+১ রিল ক্যানভাস স্লট মেশিন জোন] (পিউর জেআইএলআই থিম ক্যাশ স্লট ভাই ভাই) -->
    <div class="slot-machine-zone">
        <div class="slot-window-frame">
            <canvas id="slot-canvas" width="360" height="220"></canvas>
        </div>
    </div>

    <!-- 🏆 ইন-লাইন লাইভ স্কোরিং মেসেজ বার -->
    <div class="win-status-container" id="win-status-box">
        <span id="win-text-msg">বেট সিলেক্ট করে SPIN বোতাম চাপুন ভাই, মানি কামিং অন ফায়ার!</span>
    </div>

    <!-- 🎛️ কন্ট্রোল প্যানেল এরিয়া (৳১-৳২০০০ প্লাস-মাইনাস ও SPIN বোতাম পাশাপাশি লক ভাই) -->
    <div class="footer-controls">
        <div class="play-section">
            <div class="bet-selector">
                <button class="bet-btn-nav" onclick="adjustBet('minus')">−</button>
                <div style="text-align: center; width: 60px;">
                    <div style="font-size: 9px; color: #aaa; font-weight: bold;">BET</div>
                    <div style="font-size: 15px; font-weight: 900; color: #fff;" id="bet-display">৳৫০</div>
                </div>
                <button class="bet-btn-nav" onclick="adjustBet('plus')">+</button>
            </div>

            <button class="play-btn" id="spin-btn" onclick="handleMoneyComingSpin()">SPIN</button>

            <div class="icon-group">
                <button class="icon-btn" id="auto-btn" onclick="toggleAuto()">🔄</button>
            </div>
        </div>
    </div>

    <!-- 🔌 [উইনগো কালার ট্রেড সিঙ্ক - ইউনিভার্সাল সকেট ইঞ্জিন লাইব্রেরি ভাই] -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
        const urlWallet = urlParams.get('wallet') || "main";
        
        const SERVER_URL = window.location.origin;

        const canvas = document.getElementById("slot-canvas");
        const ctx = canvas.getContext("2d");

        let balance = 0.00;
        let currentBet = 50; 
        let isSpinning = false; 
        let isAuto = false;
        let isMuted = false;
        let autoInterval = null;

        // ৩টি বামের রিল (ক্যাশ ডিজিট) এবং ডানের ১ম রিল (স্পেশাল বুস্টার মাল্টিপ্লায়ার)
        let reels = [
            { symbols: ["0", "1", "5", "00"], y: 0, speed: 0, targetY: 0 }, // Reel 1
            { symbols: ["0", "5", "00", "0"], y: 0, speed: 0, targetY: 0 }, // Reel 2
            { symbols: ["0", "0", "5", "00"], y: 0, speed: 0, targetY: 0 }, // Reel 3
            { symbols: ["x1", "x2", "x5", "x10"], y: 0, speed: 0, targetY: 0 } // Reel 4 (Multiplier Booster)
        ];

        const reelWidth = 82;
        const reelHeight = 220;
        const itemHeight = 70;
        // ৩+১ রিল পজিশন বিন্যাস করার অফসেট গাইড
        const startX = (canvas.width - (4 * reelWidth)) / 2;

        function renderMoneyComingMachine() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < 4; i++) {
                const rx = startX + (i * reelWidth);
                
                // ৪ নম্বর রিলটি বুস্টার হওয়ায় লাক্সারি পার্পল গোল্ডেন ব্যাকগ্রাউন্ড ভাই ভাই
                ctx.fillStyle = (i === 3) ? "#201238" : "#0f1524";
                ctx.fillRect(rx, 0, reelWidth - 6, reelHeight);
                
                ctx.strokeStyle = (i === 3) ? "#f1c40f" : "#1e293b";
                ctx.lineWidth = 2;
                ctx.strokeRect(rx, 0, reelWidth - 6, reelHeight);

                ctx.save();
                ctx.beginPath();
                ctx.rect(rx, 0, reelWidth - 6, reelHeight);
                ctx.clip();

                const currentY = reels[i].y;
                const totalItems = reels[i].symbols.length;

                for (let j = -2; j < totalItems + 2; j++) {
                    const index = (j + totalItems * 10) % totalItems;
                    const sym = reels[i].symbols[index];
                    const py = (j * itemHeight) + (currentY % itemHeight);

                    // টেক্সট কালার সিঙ্ক: ডানের বুস্টার সোনালী, বামের ডিজিটগুলো ক্রিস্টাল নিয়ন হোয়াইট ভাই ভাই
                    ctx.fillStyle = (i === 3) ? "#f1c40f" : "#ffffff";
                    ctx.font = "bold 34px Arial";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    
                    if (i === 3) {
                        ctx.shadowColor = "#f39c12";
                        ctx.shadowBlur = isSpinning ? 10 : 2;
                    } else {
                        ctx.shadowColor = "#00ffcc";
                        ctx.shadowBlur = isSpinning ? 6 : 0;
                    }
                    
                    ctx.fillText(sym, rx + (reelWidth - 6)/2, py + itemHeight/2);
                    ctx.shadowBlur = 0;
                }
                ctx.restore();
            }

            // মিডেল উইন টার্গেট লাইন বর্ম ভাই ভাই
            ctx.strokeStyle = "rgba(255, 0, 85, 0.8)";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(startX, canvas.height / 2);
            ctx.lineTo(startX + (4 * reelWidth) - 6, canvas.height / 2);
            ctx.stroke();
        }

        // 🧠 [৪-রিল ওয়ান-ক্লিক হাই-স্পিড মোশন এনিমেশন লুপ ইঞ্জিন ভাই ভাই]
        function updateSlotAnimation() {
            let stillSpinning = false;

            for (let i = 0; i < 4; i++) {
                if (reels[i].speed > 0.2) {
                    reels[i].y += reels[i].speed;
                    reels[i].speed *= 0.95; // ডাইনামিক ব্রেক ফ্রিকশন
                    stillSpinning = true;
                } else if (reels[i].speed > 0) {
                    reels[i].speed = 0;
                    reels[i].y = reels[i].targetY;
                    playAudio('click1'); // 🚀 রিল খুটখুট করে লক হওয়ার ওরিজিনাল সাউন্ড ভাই ভাই
                }
            }

            renderMoneyComingMachine();

            if (stillSpinning) {
                requestAnimationFrame(updateSlotAnimation);
            } else {
                isSpinning = false;
                if (!isAuto) document.getElementById("spin-btn").disabled = false;
            }
        }

        if (typeof io !== 'undefined') {
            const socket = io();
            socket.on("balanceUpdate", (data) => {
                if (data && data.username === urlUserId) {
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    fetchLiveBalance();
                }
            });
        }

        async function fetchLiveBalance() {
            try {
                const response = await fetch(`${SERVER_URL}/api/moneycoming-balance?userId=${urlUserId}&wallet=${urlWallet}`);
                const data = await response.json();
                if (data && data.success) {
                    balance = parseFloat(data.balance);
                    document.getElementById("user-balance").innerText = balance.toFixed(2);
                }
            } catch (e) { console.error("Balance fetch lag"); }
        }

        window.onload = () => {
            if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
            fetchLiveBalance();
            renderMoneyComingMachine();
        };

        function adjustBet(action) {
            if (isSpinning) return;
            if (action === 'minus' && currentBet > 1) {
                if (currentBet <= 10) currentBet -= 1;
                else if (currentBet <= 100) currentBet -= 10;
                else currentBet -= 50;
            }
            if (action === 'plus' && currentBet < 2000) {
                if (currentBet < 10) currentBet += 1;
                else if (currentBet < 100) currentBet += 10;
                else currentBet += 50;
            }
            if (currentBet < 1) currentBet = 1;
            if (currentBet > 2000) currentBet = 2000;
            
            document.getElementById("bet-display").innerText = `৳${currentBet}`;
            playAudio('click');
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById("mute-btn").innerText = isMuted ? "🔇" : "🔊";
            document.getElementById("mute-btn").classList.toggle("muted-active", isMuted);
        }

                function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById("auto-btn").classList.toggle("active", isAuto);
            if (isAuto && !isSpinning) handleMoneyComingSpin();
            playAudio('click');
        }

        async function handleMoneyComingSpin() {
            if (isSpinning) return;

            document.getElementById("win-status-box").className = "win-status-container";
            document.getElementById("win-text-msg").innerText = "🎰 রিলগুলো হাই-স্পিডে ঘুরছে...";

            isSpinning = true;
            document.getElementById("spin-btn").disabled = true;
            
            playAudio('click');
            playAudio('spin'); // 🚀 রিল ওড়ার কড়া ক্যাসিনো spin2.mp3 সাউন্ড ফায়ার লক ভাই!

            // ৪টি রিল এক টানা স্পিডে স্ক্রলিং এনিমেশন মোড চালু ভাই ভাই
            reels.forEach(r => {
                r.speed = 18 + (Math.random() * 8); // ডাইনামিক র্যান্ডম স্পিড রান ভাই ভাই
            });
            requestAnimationFrame(updateSlotAnimation);

            try {
                const response = await fetch(`${SERVER_URL}/api/moneycoming-spin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: urlUserId,
                        amount: parseFloat(currentBet),
                        wallet: urlWallet
                    })
                });

                const data = await response.json();

                if (data && data.success === true) {
                    balance = parseFloat(data.balance);
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    if (window.top) window.top.postMessage({ action: "refresh_wallet" }, "*");

                    // 🎯 [রিল স্টপিং ফিজিক্স গাইড চাবি]: ব্যাকএন্ডের রিয়েল ক্যাশ ডাটা অনুযায়ী ৪টি রিলকে এক লাইনে এলাইন লক!
                    setTimeout(() => {
                        reels[0].symbols = [data.reel1, "0", "1", "5"]; reels[0].targetY = 0;
                    }, 1000);

                    setTimeout(() => {
                        reels[1].symbols = [data.reel2, "5", "0", "00"]; reels[1].targetY = 0;
                    }, 1400);

                    setTimeout(() => {
                        reels[2].symbols = [data.reel3, "0", "5", "00"]; reels[2].targetY = 0;
                    }, 1800);

                    setTimeout(() => {
                        reels[3].symbols = [data.multiplier, "x1", "x2", "x5"]; reels[3].targetY = 0;
                        
                        // ৪টি রিল সম্পূর্ণ স্টপ হওয়ার পর ফাইনাল প্রফিট শোডাউন হবে ভাই ভাই
                        setTimeout(() => {
                            showFinalReward(data.status, data.winAmount, data.baseWin, data.multiplier);
                        }, 500);
                    }, 2200);

                } else {
                    alert(data.message || "❌ Insufficient Balance! Please Recharge.");
                    stopSlotState();
                }
            } catch (err) {
                alert("⚠️ সেশন আউট! আবার SPIN বোতাম চাপুন ভাই ভাই।");
                stopSlotState();
            }
        }

        function showFinalReward(status, winAmount, baseWin, multiplier) {
            const msgBox = document.getElementById("win-status-box");
            const textMsg = document.getElementById("win-text-msg");

            if (status === "win") {
                if (winAmount >= (currentBet * 4)) {
                    playAudio('bigwin'); // 🚀 মেগা জ্যাকপট হিট হলে bigwin1.mp3 ভাই ভাই
                } else {
                    playAudio('win'); // 🚀 সাধারণ প্রফিট উইন হলে win2.mp3 ভাই ভাই
                }
                msgBox.className = "win-status-container win-glow-bar";
                textMsg.innerText = `🏆 মেগা উইন!! ক্যাশ ডিজিট: ৳${baseWin} (${multiplier} বুস্টার) = ৳${winAmount}`;
            } else {
                playAudio('wheel'); // 🚀 রিল অমিল বা লস হলে wheel1.mp3 ব্যাকআপ সাউন্ড ফায়ার লক!
                msgBox.className = "win-status-container lose-glow-bar";
                textMsg.innerText = "❌ এই রাউন্ডে রিল ক্যাশ লাইন মেলেনি ভাই। আবার ট্রাই করুন ভাই ভাই!";
            }

            document.getElementById("user-balance").innerText = balance.toFixed(2);
            stopSlotState();

            if (isAuto) {
                autoInterval = setTimeout(() => {
                    if (isAuto) handleMoneyComingSpin();
                }, 2000);
            }
        }

        function stopSlotState() {
            isSpinning = false;
            document.getElementById("spin-btn").disabled = false;
            if (!isAuto && autoInterval) clearTimeout(autoInterval);
        }

        // 🎯 [৫টি প্রিমিয়াম সাউন্ড ও বাফার গেটওয়ে লক ভাই ভাই]
        const slotSounds = {
            click: new Audio('click2.mp3'),   // 🚀 বাটন ক্লিক
            spin: new Audio('spin2.mp3'),     // 🚀 শোঁ শোঁ রিল ঘূর্ণন সাউন্ড
            click1: new Audio('click1.mp3'),   // 🚀 রিল খুটখুট করে লক হওয়ার সাউন্ড
            win: new Audio('win2.mp3'),       // 🚀 নরমাল লাইন উইন
            bigwin: new Audio('bigwin1.mp3'), // 🚀 মেগা জ্যাকপট ব্লাস্ট
            wheel: new Audio('wheel1.mp3')    // 🚀 লস ব্যাকআপ সাউন্ড
        };
        Object.values(slotSounds).forEach(s => s.load());

        function playAudio(type) { 
            if (isMuted) return; // 🔇 সাউন্ড অফ থাকলে কোনো অডিও প্লে হবে না ভাই ভাই!
            try { 
                slotSounds[type].currentTime = 0; 
                slotSounds[type].play(); 
            } catch(e){} 
        }
    </script>
</body>
</html>
