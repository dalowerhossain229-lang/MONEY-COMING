<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JILI Money Coming - VIP CASINO PREMIUM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="jili-money-stadium">
    
    <!-- 👑 ওপরের অফিশিয়াল গোল্ডেন নেভিগেশন ডিসপ্লে বার -->
    <div class="jili-navbar">
        <div class="jili-back-btn">◀ LOBBY</div>
        <div class="jili-brand-logo">JILI MONEY COMING</div>
        <!-- 🎯 ওস্তাদ! কিলার ফিক্স—আপনার অন্য সচল গেমের ওরিজিনাল ওয়ালেট ডিসপ্লে আইডি 'user-balance' এখানে ১০০% কড়া লক! -->
        <div class="jili-balance-box">৳ <span id="user-balance">0.00</span> 🪙</div>
    </div>

    <!-- 🎰 [🔒 জিলির অবিকল ৩+১ লাক্সারি ক্যাসিনো রিল ক্যানভাস কাঠামো কড়া লক 🔒] -->
    <div class="reels-main-wrapper">
        <div class="winning-payline-laser"></div> <!-- মেইন মাঝখানের লাল উইন লাইন সিঙ্ক ভাই -->
        
        <!-- রিল ১ (মেইন মানি নোড) -->
        <div class="reel-container">
            <div class="reel-strip" id="reel-1">
                <div class="reel-cell">0</div>
                <div class="reel-cell">1</div>
                <div class="reel-cell">5</div>
                <div class="reel-cell">10</div>
            </div>
        </div>

        <!-- রিল ২ (মেইন মানি নোড) -->
        <div class="reel-container">
            <div class="reel-strip" id="reel-2">
                <div class="reel-cell">0</div>
                <div class="reel-cell">00</div>
                <div class="reel-cell">1</div>
                <div class="reel-cell">5</div>
            </div>
        </div>

        <!-- রিল ৩ (মেইন মানি নোড) -->
        <div class="reel-container">
            <div class="reel-strip" id="reel-3">
                <div class="reel-cell">0</div>
                <div class="reel-cell">1</div>
                <div class="reel-cell">5</div>
                <div class="reel-cell">0</div>
            </div>
        </div>

        <!-- ⚡ রিল ৪ (ডানদিকের স্পেশাল মেগা বুস্টার উইন রিল) ⚡ -->
        <div class="reel-container special-booster-reel">
            <div class="reel-strip" id="reel-4">
                <div class="reel-cell multiplier-cell">X2</div>
                <div class="reel-cell free-spin-cell">FREE SPIN</div>
                <div class="reel-cell multiplier-cell">X5</div>
                <div class="reel-cell joker-cell">JOKER</div>
                <div class="reel-cell multiplier-cell">X10</div>
            </div>
        </div>
    </div>

    <!-- 🏆 [উইন ফ্ল্যাশ স্ক্রিন ওভারলে প্যানেল ভাই ভাই] -->
    <div id="jili-win-overlay" class="jili-win-popup-overlay">
        <div class="jili-win-popup-box">
            <div class="jili-popup-title" id="jili-popup-status">BIG WIN</div>
            <div class="jili-popup-amount" id="jili-popup-money">৳0.00</div>
        </div>
    </div>

    <!-- 🎛️ নিচের মেইন বেটিং ড্যাশবোর্ড কন্ট্রোল প্যানেল -->
    <div class="jili-control-footer">
        
        <!-- স্টেক ইনপুট এবং প্লাস-মাইনাস বাটন গ্রিড -->
        <div class="jili-stake-row">
            <button class="jili-ctrl-btn" onclick="adjustJiliBet('minus')">−</button>
            <div class="jili-stake-display">
                <span style="font-size: 10px; color: #aaa; display: block; font-weight: bold;">BET STAKE</span>
                ৳ <span id="jili-bet-val">100.00</span>
            </div>
            <button class="jili-ctrl-btn" onclick="adjustJiliBet('plus')">+</button>
        </div>

        <!-- শর্টকাট স্টেক মাল্টিপ্লায়ার বোতাম চিপস -->
        <div class="jili-shortcuts-bar">
            <button class="jili-short-btn" onclick="quickJiliBet(10)">৳10</button>
            <button class="jili-short-btn" onclick="quickJiliBet(100)">৳100</button>
            <button class="jili-short-btn" onclick="quickJiliBet(500)">৳500</button>
            <button class="jili-short-btn" onclick="quickJiliBet(2000)">৳2000</button>
        </div>

        <!-- 🚀 গ্র্যান্ড ক্যাসিনো SPIN ফায়ার বোতাম -->
        <button class="jili-spin-master-btn" id="jili-spin-trigger" onclick="fireJiliMoneySpinEngine()">SPIN</button>
    </div>

</div>

<!-- 📢 Sockets নেটওয়ার্ক ও জিলির ওরিজিনাল ওতো-ড্রাইভার স্ক্রিপ্ট লজিক -->
<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let currentJiliBet = 100.00;
    let isReelsSpinning = false;
    let livePlatformBalance = 0.00;
    let SERVER_URL = window.location.origin;

    const urlParams = new URLSearchParams(window.location.search);
    const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
    const urlWallet = urlParams.get('wallet') || "main";

        // 🚀 [🔒 ওস্তাদ! আইফ্রেম প্যারামিটার লস প্রোটেকশন ও ব্যালেন্স ১ শতভাগ ওতো-টেনে আনার সুপ্রীম কিংস বর্ম লক 🔒]
    async function fetchLiveBalance() {
        try {
            // ১. মেইন ড্যাশবোর্ড আইফ্রেমের সমস্ত সম্ভাব্য আইডি প্যারামিটার এক টানে ক্যাচ লক ভাই!
            let targetUser = urlParams.get('userId') || urlParams.get('username') || urlParams.get('id') || urlParams.get('user');
            let targetWallet = urlParams.get('wallet') || "main";

            // 🚨 [মেগা কিলার কিংস ফিক্স]: যদি আইফ্রেম লিংক কেটে আইডি গায়েবও হয়ে যায়, প্যারেন্ট ড্যাশবোর্ড স্ক্রিন থেকে আইডি ফোর্সড রিড করার ফর্মুলা!
            if (!targetUser || targetUser === "guest_user") {
                try {
                    if (window.parent && window.parent.location && window.parent.location.search) {
                        const parentParams = new URLSearchParams(window.parent.location.search);
                        targetUser = parentParams.get('userId') || parentParams.get('username') || parentParams.get('id') || parentParams.get('user');
                        targetWallet = parentParams.get('wallet') || "main";
                    }
                } catch (parentErr) {
                    // ক্রস-ওরিজিন বাউণ্ডারি থাকলে অল্টারনেট ডকুমেন্ট রেফ ট্র্যাকার সিঙ্ক ভাই ভাই
                    if (document.referrer) {
                        const refUrl = new URL(document.referrer);
                        const refParams = new URLSearchParams(refUrl.search);
                        targetUser = refParams.get('userId') || refParams.get('username') || refParams.get('id');
                        targetWallet = refParams.get('wallet') || "main";
                    }
                }
            }

            // যদি তাও না পায় তবে সেফটি ব্যাকআপ গ্লোবাল লোকালস্টোরেজ মেমোরি সিঙ্ক ভাই ভাই
            if (!targetUser || targetUser === "guest_user") targetUser = localStorage.getItem('activeJiliUser') || "guest_user";
            if (targetUser && targetUser !== "guest_user") localStorage.setItem('activeJiliUser', targetUser);

            // ২. ওস্তাদ! আপনার অন্য গেমের অবিকল ওরিজিনাল রাউট ব্যাকএ্যান্ডে হিট ফায়ার!
            const response = await fetch(`${SERVER_URL}/api/rainbow-balance?userId=${targetUser}&wallet=${targetWallet}`);
            const data = await response.json();
            if (data && data.success) {
                livePlatformBalance = parseFloat(data.balance);
                
                // জিলির গোল্ডেন ওয়ালেট ডিসপ্লে বক্সে টাকা রিয়েল-টাইমে ওতো-লোড ফায়ার ভাই ভাই!
                const balanceDisplay = document.getElementById("user-balance");
                if (balanceDisplay) {
                    balanceDisplay.innerText = livePlatformBalance.toFixed(2);
                }
            }
        } catch (e) { 
            console.error("Balance fetch delay bypass handler active"); 
        }
    }

    // সকেট লাইভ অ্যাকাউন্ট রিফ্রেশার সিঙ্ক পাইপ (ব্যালেন্স আপডেট হলে ওতো-টেনে আনবে ভাই)
    if (typeof io !== 'undefined') {
        socket.on('balanceUpdate', (data) => {
            let currentActiveUser = urlUserId || localStorage.getItem('activeJiliUser');
            if (data && data.username === currentActiveUser) {
                livePlatformBalance = parseFloat(data.balance);
                const balanceDisplay = document.getElementById("user-balance");
                if (balanceDisplay) balanceDisplay.innerText = livePlatformBalance.toFixed(2);
            }
        });
    }

    // ফার্স্ট টাইম এরিনা বুট সিঙ্ক (পেজ লোড হওয়ার সাথে সাথে ৩ বার ওতো-রিফ্রেশ ফায়ার যাতে জ্যাম না লাগে)
    window.onload = () => {
        if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
        fetchLiveBalance();
        setTimeout(fetchLiveBalance, 300);
        setTimeout(fetchLiveBalance, 800);
    };


    function adjustJiliBet(action) {
        if (isReelsSpinning) return;
        if (action === 'minus' && currentJiliBet > 10) currentJiliBet -= 10;
        if (action === 'plus' && currentJiliBet < 50000) currentJiliBet += 10;
        document.getElementById("jili-bet-val").innerText = currentJiliBet.toFixed(2);
    }

    function quickJiliBet(val) {
        if (isReelsSpinning) return;
        currentJiliBet = parseFloat(val);
        document.getElementById("jili-bet-val").innerText = currentJiliBet.toFixed(2);
    }

    // 🚀 [🔒 জিলির ওরিজিনাল ৩+১ রিল স্পিনিং থ্রিডি মোশন অ্যালগরিদম ইঞ্জিন লক 🔒]
    async function fireJiliMoneySpinEngine() {
        if (isReelsSpinning || livePlatformBalance < currentJiliBet) {
            if (livePlatformBalance < currentJiliBet) alert("❌ ব্যালেন্স অপ্রতুল ওস্তাদ!");
            return;
        }

        isReelsSpinning = true;
        const spinBtn = document.getElementById("jili-spin-trigger");
        spinBtn.disabled = true;
        spinBtn.classList.add("spinning-lock");
        spinBtn.innerText = "💥";

        try {
            // 🎰 [জিলির ওরিজিনাল জিরো-এরর ব্যালেন্স কাটিং সিঙ্ক ব্যাকএন্ড হিট ভাই]
            const response = await fetch(`${SERVER_URL}/api/jili-bet`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: urlUserId, amount: currentJiliBet, wallet: urlWallet })
            });
            const betResult = await response.json();

            if (betResult.success) {
                livePlatformBalance = parseFloat(betResult.balance);
                document.getElementById("user-balance").innerText = livePlatformBalance.toFixed(2);

                let winDigits = betResult.winDigits; 
                let boosterWin = betResult.booster;  
                let totalWinCash = betResult.winAmount;

                // ৪টি রিল স্ক্রিপ্ট সিএসএস ক্লাস দিয়ে ধামাধাম স্পিন মোশন ফায়ার ভাই ভাই!
                for (let i = 1; i <= 4; i++) {
                    let reelNode = document.getElementById(`reel-${i}`);
                    if (reelNode) {
                        reelNode.classList.add("blur-spinning-animation");
                    }
                }

                // জিলির অফিশিয়াল রিল স্টপ টাইমিং সিকোয়েন্স ম্যাপিং ভাই ভাই!
                setTimeout(() => { stopIndividualJiliReel(1, winDigits); }, 1000);
                setTimeout(() => { stopIndividualJiliReel(2, winDigits); }, 1400);
                setTimeout(() => { stopIndividualJiliReel(3, winDigits); }, 1800);
                
                setTimeout(() => { 
                    stopIndividualJiliReel(4, boosterWin); 
                    
                    // 🏆 ৪ নম্বর স্পেশাল রিল থামা মাত্রই গ্র্যান্ড উইনিং পপআপ স্ক্রিনে ফ্লাশ হবে ওস্তাদ!
                    setTimeout(() => {
                        triggerJiliWinPopupDisplay(totalWinCash, boosterWin);
                        isReelsSpinning = false;
                        spinBtn.disabled = false;
                        spinBtn.classList.remove("spinning-lock");
                        spinBtn.innerText = "SPIN";
                        fetchLiveBalance();
                    }, 500);
                }, 2200);

            } else {
                alert(betResult.message || "Declined!");
                isReelsSpinning = false;
                spinBtn.disabled = false;
                spinBtn.classList.remove("spinning-lock");
                spinBtn.innerText = "SPIN";
            }
        } catch (err) {
            isReelsSpinning = false;
            spinBtn.disabled = false;
            spinBtn.classList.remove("spinning-lock");
            spinBtn.innerText = "SPIN";
        }
    }

        function stopIndividualJiliReel(reelNum, winValue) {
        let reelNode = document.getElementById(`reel-${reelNum}`);
        if (!reelNode) return;
        
        reelNode.classList.remove("blur-spinning-animation");
        
        // উইনিং ভ্যালুটিকে রিল স্ট্রিপের একদম মাঝখানের উইন লাইনে লক করার পিক্সেল অফসেট ড্রাইভার!
        let cells = reelNode.querySelectorAll('.reel-cell');
        let matchIndex = 0;
        cells.forEach((c, idx) => {
            if (c.innerText === String(winValue)) matchIndex = idx;
        });

        let targetOffset = -(matchIndex * 80); // প্রতিটা সেলের হাইট ৮০ পিক্সেল সিঙ্ক লক ভাই ভাই!
        reelNode.style.transform = `translateY(${targetOffset}px)`;
    }

    function triggerJiliWinPopupDisplay(amount, booster) {
        const overlay = document.getElementById("jili-win-overlay");
        const statusTxt = document.getElementById("jili-popup-status");
        const moneyTxt = document.getElementById("jili-popup-money");

        if (!overlay || amount <= 0) return;

        moneyTxt.innerText = "৳" + parseFloat(amount).toFixed(2);
        statusTxt.innerText = booster.includes("X") ? `MULTI ${booster} WIN!!` : `${booster} BONUS!!`;

        overlay.style.display = "flex";
        
        try {
            let audioNode = new Audio('win6.mp3');
            audioNode.currentTime = 0;
            audioNode.play().catch(e => {});
        } catch(e) {}

        // ⏱️ কাঁটায় কাঁটায় ঠিক ১.৫ সেকেন্ড স্ক্রিনে বড় হয়ে ভেসে থেকে ওতো-ভ্যানিশ লক ওস্তাদ!
        setTimeout(() => { overlay.style.display = "none"; }, 1500);
    }

    // 🔌 সকেট লাইভ অ্যাকাউন্ট রিফ্রেশার সিঙ্ক পাইপ (ব্যালেন্স আপডেট হলে ওতো-টেনে আনবে ভাই)
    if (typeof io !== 'undefined') {
        socket.on('balanceUpdate', (data) => {
            if (data && data.username === urlUserId) {
                livePlatformBalance = parseFloat(data.balance);
                const balanceDisplay = document.getElementById("user-balance");
                if (balanceDisplay) livePlatformBalance = parseFloat(data.balance);
                const balanceDisplayNode = document.getElementById("user-balance");
                if (balanceDisplayNode) balanceDisplayNode.innerText = livePlatformBalance.toFixed(2);
            }
        });
    }

    // ওতো-বুটস্ট্র্যাপ মেমোরি ইন্টারফেস বুট সিঙ্ক
    window.onload = () => {
        if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
        fetchLiveBalance();
        // ব্যাকআপ সিঙ্ক ট্র্যাকার ২ বার ওতো-রিফ্রেশ ফায়ার ওস্তাদ ভাই ভাই!
        setTimeout(fetchLiveBalance, 400);
        setTimeout(fetchLiveBalance, 900);
    };
</script>
</body>
</html>
